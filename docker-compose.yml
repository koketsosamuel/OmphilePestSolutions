services:
  omphile-pest-solutions:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omphile-pest-solutions
    ports:
      - "80:3000"
    restart: unless-stopped
    networks:
      - omphile-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  omphile-network:
    driver: bridge
